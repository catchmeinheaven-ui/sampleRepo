// Import Ant script near the end, so that dependencies.properties is created and ready for ant script
task import_ant {
    ant.importBuild 'icm-builder/build.xml'
}


package.mustRunAfter 'prepare_icmbuilder_build', 'import_ant'

task icmbuilder_findbugs(dependsOn: ['extract_findbugs']) {

    doLast {
    
        def findbugsReportsDir = new File('icm-builder/findbugsReports')
        if( !findbugsReportsDir.exists() ) {
            findbugsReportsDir.mkdirs()
        }

        ant.taskdef(name: 'icmfindbugs',
                    classname: 'edu.umd.cs.findbugs.anttask.FindBugsTask',
                    classpath: commonProp['findbugs.dir'] + '/lib/findbugs-ant.jar')
        ant.icmfindbugs(home: commonProp['findbugs.dir'],
                     output: 'html',
                     outputFile: 'icm-builder/findbugsReports/icmcb_java.html',
                     excludefilter: 'icm-builder/excludeFilter.xml') {
            sourcePath(path: commonProp.restsrc)
            "class"(location: 'icm-builder/lib/CaseBuilder.jar')
            //auxClasspath(refid: configurations.icmapifindbugs)
        }
    }

}

task icmbuilder_jslint {

    doLast {

        def findbugsReportsDir = new File('icm-builder/findbugsReports')
            if( !findbugsReportsDir.exists() ) {
                findbugsReportsDir.mkdirs()
            }

        ant.taskdef(name: 'icmjslint',
                        classname: 'com.googlecode.jslint4java.ant.JSLintTask',
                        classpath: configurations.jslintjar.asPath)
                    
        ant.icmjslint(haltOnFailure: "false",  options: "anon,bitwise,cap,continue,css,debug,devel,eqeq,es5,evil,forin,fragment,newcap,nomen,on,plusplus,regexp,sloppy,sub,undef,unparam,vars,white,maxerr=10000") {
        
            formatter(type: 'xml', destfile: 'icm-builder/findbugsReports/icmcb_js.xml')
