apply plugin: 'eclipse'
apply plugin: 'java'
apply plugin: 'maven'
apply plugin: 'maven-publish'
apply plugin: 'project-report'
apply plugin: 'com.jfrog.artifactory'

// Load root common.properties
ext.commonProp = new Properties()
commonProp.load(new FileInputStream(file('common.properties')))

// Load build.properties.  If not present, use a Snapshot version.
ext.buildProp = new Properties()
def versionICN = commonProp.productversion + '-SNAPSHOT'
if (file('build.properties').exists()) {
    buildProp.load(new FileInputStream(file('build.properties')))
    
    // Get release number without fix pack
    int fpDotIndex = commonProp.productversion.lastIndexOf(".");
    String releaseStr = commonProp.productversion.substring(0, fpDotIndex);
    println "Release Number: " + releaseStr
    
    // Determine Fix Pack number
    // Find the release number, then use that to get the fix pack index
    int fpIndex = buildProp.buildnumber.indexOf(releaseStr) + releaseStr.length() + 1;
    int dotIndex = buildProp.buildnumber.indexOf(".", fpIndex);
    int fpVersion = 0;
    String fpVersionStr = buildProp.buildnumber.substring(fpIndex, dotIndex);
    println "Fix Pack version: " + fpVersionStr
    fpVersion = Integer.parseInt(fpVersionStr);
    
    // Determine build counter number
    int lastPeriodIndex = buildProp.buildnumber.lastIndexOf(".");
    String counterVersionStr = buildProp.buildnumber.substring(lastPeriodIndex + 1);
    int counterVersion = Integer.parseInt(counterVersionStr);
    
    versionICN = releaseStr + "-" + fpVersion + "-" + counterVersion;
}

def snapshotVersion = commonProp.productversion + '-SNAPSHOT'
version = buildProp.buildnumber ?: snapshotVersion
ant.project.setProperty('buildLabel', version)
println "Version : ${version}"
println "Version to use for ICN: $versionICN"

