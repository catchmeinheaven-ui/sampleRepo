// Download and extract IBM Java SDK
import org.apache.tools.ant.taskdefs.condition.Os
task extract_java_sdk(type: Sync) {
    if (Os.isFamily(Os.FAMILY_WINDOWS)) { // Extract Windows SDK
        from zipTree(configurations.javasdkwin.asPath)
    }
    else { // Extract Linux SDK
        from tarTree(resources.gzip(configurations.javasdklinux.asPath))
    }
    into commonProp['3pt.java.sdk']
}

task copy_java_linux(type: Copy) {
    if (Os.isFamily(Os.FAMILY_WINDOWS)) { // Do nothing
    }
    else { // Copy java binary from the JRE bin to the SDK bin
        from commonProp['3pt.java.sdk'] + '/java/sdk/jre/bin'
        include 'java'
    }
    into commonProp['3pt.java.sdk'] + '/java/sdk/bin'
}

copy_java_linux.mustRunAfter 'extract_java_sdk'

// Edit gradle.properties to set Java path
task set_java_home {
    doLast {
        ant.propertyfile(file: 'gradle.properties') {
            if (Os.isFamily(Os.FAMILY_WINDOWS)) { // Extract Windows SDK
                entry(key: 'org.gradle.java.home', value: "$projectDir/" + commonProp['3pt.java.sdk'] + '/sdk')
            }
            else { // Extract Linux SDK
                entry(key: 'org.gradle.java.home', value: "$projectDir/" + commonProp['3pt.java.sdk'] + '/java/sdk')
            }
        }
    }
}

task setup_java(dependsOn: ['extract_java_sdk', 'copy_java_linux', 'set_java_home'])

// Compress the cb-web-form.xml and cb-web-sso.xml files
task compress_cb_web_files(type: Zip) {
    from 'CDROOT/cb-web-form.xml'
    from 'CDROOT/cb-web-sso.xml'
    baseName = 'cb-web-files'
}
compress_cb_web_files.mustRunAfter 'clearDistFolder'

task writeNewPom {
    pom {
        project {
            groupId 'com.ibm.icm.icmbuilder'
            artifactId 'acmrulesapi'
            packaging 'jar'
        }
    }.writeTo("$buildDir/publications/mavenICMRulesAPIJar/pom-default.xml")
    pom {
        project {
            groupId 'com.ibm.icm.icmbuilder'
            artifactId 'ICMSolutionEdit'
            packaging 'jar'
        }
    }.writeTo("$buildDir/publications/mavenICMSolutionEditJar/pom-default.xml")
    pom {
        project {
            groupId 'com.ibm.icm.icmbuilder'
            artifactId 'ICMSolutionEdit'
            packaging 'jar'
            version versionICN
        }
    }.writeTo("$buildDir/publications/mavenICMSolutionEditJarICN/pom-default.xml")
    pom {
        project {
            groupId 'com.ibm.icm.icmbuilder'
            artifactId 'CaseBuilder'
            packaging 'ear'
            version version
        }
    }.writeTo("$buildDir/publications/mavenICMCaseBuilderEar/pom-default.xml")
    pom {
        project {
            groupId 'com.ibm.icm.icmbuilder'
            artifactId 'cb-web-files'
            packaging 'zip'
        }
    }.writeTo("$buildDir/publications/mavenICMCBWebFilesZip/pom-default.xml")
    pom {
        project {
            groupId 'com.ibm.icm.icmbuilder'
            artifactId 'cbConfig'
            packaging 'properties'
        }
    }.writeTo("$buildDir/publications/mavenICMCBConfigProperties/pom-default.xml")
}
    
artifactoryPublish {
    dependsOn writeNewPom
}

artifactory {
    contextUrl = ARTIFACTORY_URL
    publish {
        repository {
            if (version == snapshotVersion)
            {    // If no version specified, publish as a snapshot
                repoKey = 'ecmcase-libs-snapshot-local'   //The Artifactory repository key to publish to
            }
            else
            {    // Version specified, so publish as a release
                repoKey = 'ecmcase-libs-release-local'
            }
            username = ARTIFACTORY_USERNAME    //The publisher user name
            password = artifactoryPassword    //The publisher password
        }       
        defaults {
            publications ('mavenICMRulesAPIJar', 'mavenICMSolutionEditJar', 'mavenICMSolutionEditJarICN', 'mavenICMCaseBuilderEar', 'mavenICMCBWebFilesZip', 'mavenICMCBConfigProperties')
        }
    }
}
