import groovyx.net.http.HTTPBuilder
import static groovyx.net.http.ContentType.*
import static groovyx.net.http.Method.*
import groovy.json.*
task cullBuilds {
    doLast {
        if (version != snapshotVersion)
        {   // Version specified, so cull released files
        
            // First, determine the build line we are currently using
            int lastPeriodIndex = version.lastIndexOf(".");
            String versionPrefix = version.substring(0, lastPeriodIndex + 1)
            String versionQuery = versionPrefix + "*";
            int lastDashIndex = versionICN.lastIndexOf("-");
            String versionPrefixICN = versionICN.substring(0, lastDashIndex + 1)
            String versionQueryICN = versionPrefixICN + "*";
            println("Culling artifacts with the version: $versionQuery and $versionQueryICN");
            
            // Next, get the list of all artifact versions under com.ibm.icm.icmbuilder
            def artifactSearchUri = 'ui/artifactactions/deleteversions?path=com%2Fibm%2Ficm%2Ficmbuilder&repoKey=ecmcase-libs-release-local'
            def authString = "${ARTIFACTORY_USERNAME}:${artifactoryPassword}".getBytes().encodeBase64().toString()            
            def urlHeaders = [ Accept: 'application/json', Authorization: 'Basic ' + authString ]
            def jsonText = new URL( "${ARTIFACTORY_URL}/${artifactSearchUri}" ).getText( requestProperties: urlHeaders )
            def versionsJson = new JsonSlurper().parseText( jsonText ) as Map
            assert versionsJson.versions != null
            
            // Make a list of all versions under com.ibm.icm.icmbuilder for the current build line
            def versionList = []
            versionsJson.versions.each {
                if ((it.version ==~ versionQuery) && (it.version.length() > lastPeriodIndex)) {
                    // Only look at the last set of digits so that we can sort them
                    // For example, for icmbuilder5.3.1.000.1, only save the 1 in the list
                    versionList.add(it.version.substring(lastPeriodIndex + 1))
                }
            }
            
            // Keep the newest five builds and delete older versions
            def fullVersionList = []
            versionList.sort().dropRight(5).each {
                // Recombine the version prefix and the last set of digits and put them in a list
                fullVersionList.add(versionPrefix + it)
                fullVersionList.add(versionPrefixICN + Integer.parseInt(it))
            }
            println "Culling the following builds: $fullVersionList"
            
            // Gather the list of all artifacts with the versions to be culled
            def deleteList = []
            versionsJson.versions.each {
                //println "Entry: $it"
                if (fullVersionList.contains(it.version)) {
                    deleteList.add(it)
                }
            }
            
            // Delete the older artifacts if there are more than 5 versions
            if (fullVersionList.size() > 0) {
                def deleteJSON = new JsonBuilder(deleteList)
                println "Deleting the following artifacts: " + JsonOutput.prettyPrint(deleteJSON.toString())
                def artifactDeleteUri = 'ui/artifactactions/deleteversions'
                def deleteCall = new groovyx.net.http.HTTPBuilder("${ARTIFACTORY_URL}/${artifactDeleteUri}")
                deleteCall.request(POST, JSON ) { req ->
                    body = deleteJSON.toString()
                    headers = urlHeaders

                    response.success = { resp, json ->
                        println "$resp.statusLine   $json"
                    }
                    
                    response.failure = { resp, json ->
                        println "$resp.statusLine   $json"
                    }
                }
            }
        }
    }
}

