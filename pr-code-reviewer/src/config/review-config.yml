# Code Review Configuration
# This file defines the rules and standards for automated code reviews

review_settings:
  # Enable/disable specific review categories
  # Focus on critical issues only - act like a senior developer
  enabled_checks:
    - security
    - performance
    - maintainability
  
  # Severity levels: critical, high, medium, low
  # Only comment on HIGH and CRITICAL issues (ignore style nitpicks)
  min_severity_to_comment: high
  
  # Auto-approve PRs that pass all checks
  auto_approve_on_success: false
  
  # Request changes if critical issues found
  request_changes_on_critical: true
  
  # Ignore low-priority issues
  ignore_style_issues: true
  ignore_documentation_issues: true
  ignore_formatting_issues: true

# Security checks
security:
  enabled: true
  checks:
    - hardcoded_credentials
    - sql_injection
    - xss_vulnerabilities
    - insecure_dependencies
    - sensitive_data_exposure
    - authentication_issues
    - authorization_flaws
  
  patterns:
    credentials:
      - 'password\s*=\s*["\'].*["\']'
      - 'api[_-]?key\s*=\s*["\'].*["\']'
      - 'secret\s*=\s*["\'].*["\']'
      - 'token\s*=\s*["\'].*["\']'
    
    sql_injection:
      - 'execute\s*\(\s*["\'].*\+.*["\']'
      - 'query\s*\(\s*["\'].*\+.*["\']'
    
    xss:
      - 'innerHTML\s*='
      - 'document\.write\s*\('
      - 'eval\s*\('

# Performance checks
performance:
  enabled: true
  checks:
    - inefficient_loops
    - memory_leaks
    - blocking_operations
    - unnecessary_computations
    - large_file_operations
  
  thresholds:
    max_function_lines: 100
    max_file_lines: 500
    max_complexity: 15
    max_nested_loops: 3

# Code maintainability
maintainability:
  enabled: true
  checks:
    - code_duplication
    - long_functions
    - complex_conditionals
    - magic_numbers
    - poor_naming
    - missing_error_handling
  
  standards:
    max_function_length: 50
    max_parameters: 5
    max_nesting_depth: 4
    min_variable_name_length: 3

# Style and formatting (DISABLED - focus on critical issues only)
style:
  enabled: false
  checks: []

# Documentation requirements (DISABLED - focus on critical issues only)
documentation:
  enabled: false
  checks: []

# Testing requirements (DISABLED - focus on critical issues only)
testing:
  enabled: false
  checks: []

# Language-specific configurations
languages:
  javascript:
    enabled: true
    file_extensions: ['.js', '.jsx', '.ts', '.tsx']
    linters: ['eslint']
    
  java:
    enabled: true
    file_extensions: ['.java']
    linters: ['checkstyle', 'pmd']
    
  python:
    enabled: true
    file_extensions: ['.py']
    linters: ['pylint', 'flake8']
    
  go:
    enabled: true
    file_extensions: ['.go']
    linters: ['golint', 'go vet']

# File exclusions
exclusions:
  paths:
    - 'node_modules/**'
    - 'dist/**'
    - 'build/**'
    - 'target/**'
    - '*.min.js'
    - '*.test.js'
    - '*.spec.js'
    - 'test/**'
    - 'tests/**'
    - '__tests__/**'
    - 'vendor/**'
    - '.git/**'
  
  file_patterns:
    - '*.lock'
    - '*.log'
    - '*.md'
    - '*.txt'

# AI Review settings
ai_review:
  enabled: true
  model: 'gpt-4'
  max_tokens: 4000
  temperature: 0.3
  
  prompts:
    system: |
      You are a SENIOR SOFTWARE ENGINEER reviewing code like an experienced tech lead.
      
      FOCUS ONLY ON CRITICAL ISSUES:
      - Build-breaking errors (syntax errors, compilation issues)
      - Logic errors that cause incorrect behavior
      - Security vulnerabilities (SQL injection, XSS, hardcoded secrets)
      - Performance bottlenecks (N+1 queries, memory leaks, infinite loops)
      - Race conditions and concurrency issues
      - Null pointer exceptions and error handling gaps
      
      IGNORE THESE (not important):
      - Code formatting (spaces, tabs, line length)
      - Missing Javadoc or comments
      - Naming conventions (unless truly confusing)
      - Style guide violations
      - Minor refactoring suggestions
      
      Be concise and actionable. Only flag issues that would cause:
      1. Build failures
      2. Runtime errors
      3. Security breaches
      4. Data corruption
      5. Performance degradation
    
    review_template: |
      Review the following code changes as a SENIOR DEVELOPER:
      
      File: {file_path}
      Changes: {diff}
      
      Only report HIGH or CRITICAL issues that affect:
      - Correctness (will it work?)
      - Security (is it safe?)
      - Performance (will it scale?)
      
      For each issue provide:
      1. What will break or fail
      2. Severity: CRITICAL or HIGH only
      3. How to fix it (with code example)
      
      Skip style, formatting, and documentation issues.

# GitHub integration
github:
  # Comment on PR with review results
  post_comments: true
  
  # Create review with approve/request changes
  create_review: true
  
  # Add labels based on review results
  add_labels: true
  
  labels:
    needs_security_review: 'security-review-needed'
    needs_performance_review: 'performance-review-needed'
    approved: 'code-review-approved'
    changes_requested: 'changes-requested'
  
  # Review comment format
  comment_format: |
    ## 🤖 Automated Code Review
    
    {summary}
    
    ### Issues Found: {issue_count}
    
    {issues}
    
    ---
    *This review was automatically generated. Please review the suggestions and make necessary changes.*

# Notification settings
notifications:
  slack:
    enabled: false
    webhook_url: ''
    channels:
      critical: '#code-review-critical'
      general: '#code-review'
  
  email:
    enabled: false
    recipients: []
    smtp_server: ''

