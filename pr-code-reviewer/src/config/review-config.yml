# Code Review Configuration
# This file defines the rules and standards for automated code reviews

review_settings:
  # Enable/disable specific review categories
  enabled_checks:
    - security
    - performance
    - maintainability
    - style
    - documentation
    - testing
  
  # Severity levels: critical, high, medium, low
  min_severity_to_comment: low
  
  # Auto-approve PRs that pass all checks
  auto_approve_on_success: false
  
  # Request changes if critical issues found
  request_changes_on_critical: true

# Security checks
security:
  enabled: true
  checks:
    - hardcoded_credentials
    - sql_injection
    - xss_vulnerabilities
    - insecure_dependencies
    - sensitive_data_exposure
    - authentication_issues
    - authorization_flaws
  
  patterns:
    credentials:
      - "password\\s*=\\s*[\"'].*[\"']"
      - "api[_-]?key\\s*=\\s*[\"'].*[\"']"
      - "secret\\s*=\\s*[\"'].*[\"']"
      - "token\\s*=\\s*[\"'].*[\"']"
    
    sql_injection:
      - "execute\\s*\\(\\s*[\"'].*\\+.*[\"']"
      - "query\\s*\\(\\s*[\"'].*\\+.*[\"']"
    
    xss:
      - "innerHTML\\s*="
      - "document\\.write\\s*\\("
      - "eval\\s*\\("

# Performance checks
performance:
  enabled: true
  checks:
    - inefficient_loops
    - memory_leaks
    - blocking_operations
    - unnecessary_computations
    - large_file_operations
  
  thresholds:
    max_function_lines: 100
    max_file_lines: 500
    max_complexity: 15
    max_nested_loops: 3

# Code maintainability
maintainability:
  enabled: true
  checks:
    - code_duplication
    - long_functions
    - complex_conditionals
    - magic_numbers
    - poor_naming
    - missing_error_handling
  
  standards:
    max_function_length: 50
    max_parameters: 5
    max_nesting_depth: 4
    min_variable_name_length: 3

# Style and formatting
style:
  enabled: true
  checks:
    - inconsistent_formatting
    - naming_conventions
    - import_organization
    - comment_quality
  
  conventions:
    javascript:
      naming: camelCase
      indent: 2
      quotes: single
    
    java:
      naming: camelCase
      indent: 4
      quotes: double
    
    python:
      naming: snake_case
      indent: 4
      quotes: single

# Documentation requirements
documentation:
  enabled: true
  checks:
    - missing_function_docs
    - missing_class_docs
    - outdated_comments
    - unclear_comments
  
  requirements:
    require_function_docs: true
    require_class_docs: true
    require_complex_logic_comments: true
    min_comment_quality_score: 7

# Testing requirements
testing:
  enabled: true
  checks:
    - missing_tests
    - low_coverage
    - test_quality
  
  requirements:
    min_coverage_percent: 80
    require_unit_tests: true
    require_integration_tests: false

# Language-specific configurations
languages:
  javascript:
    enabled: true
    file_extensions: ['.js', '.jsx', '.ts', '.tsx']
    linters: ['eslint']
    
  java:
    enabled: true
    file_extensions: ['.java']
    linters: ['checkstyle', 'pmd']
    
  python:
    enabled: true
    file_extensions: ['.py']
    linters: ['pylint', 'flake8']
    
  go:
    enabled: true
    file_extensions: ['.go']
    linters: ['golint', 'go vet']

# File exclusions
exclusions:
  paths:
    - 'node_modules/**'
    - 'dist/**'
    - 'build/**'
    - 'target/**'
    - '*.min.js'
    - '*.test.js'
    - '*.spec.js'
    - 'test/**'
    - 'tests/**'
    - '__tests__/**'
    - 'vendor/**'
    - '.git/**'
  
  file_patterns:
    - '*.lock'
    - '*.log'
    - '*.md'
    - '*.txt'

# AI Review settings
ai_review:
  enabled: true
  model: 'gpt-4o-mini'
  max_tokens: 4000
  temperature: 0.3
  
  prompts:
    system: |
      You are an expert code reviewer. Your PRIMARY responsibility is to catch CRITICAL ERRORS that will break the code.
      
      PRIORITY 1 - COMPILATION/SYNTAX ERRORS (CRITICAL):
      - Missing semicolons, brackets, parentheses
      - Type mismatches (e.g., assigning string to int variable)
      - Undefined variables or functions
      - Syntax errors that prevent compilation
      - Import/package errors
      
      PRIORITY 2 - LOGIC ERRORS (HIGH):
      - Null pointer exceptions
      - Array index out of bounds
      - Division by zero
      - Infinite loops
      - Race conditions
      
      PRIORITY 3 - SECURITY (HIGH):
      - SQL injection vulnerabilities
      - XSS vulnerabilities
      - Hardcoded credentials
      - Insecure data handling
      
      PRIORITY 4 - PERFORMANCE (MEDIUM):
      - Memory leaks
      - Inefficient algorithms
      - Resource leaks
      
      IGNORE: Code style, formatting, naming conventions, documentation
      
      Format response as JSON array: [{"type": "syntax_error", "severity": "critical", "title": "...", "message": "...", "line": 10, "suggestion": "..."}]
    
    review_template: |
      YOU ARE A SYNTAX CHECKER AND COMPILER. Find SYNTAX ERRORS and COMPILATION ERRORS.
      
      File: {file_path}
      Language: {extension}
      
      COMPLETE FILE CONTENT:
      {diff}
      
      CRITICAL ERRORS TO FIND:
      
      1. MISSING COMMAS in object/array literals:
         JavaScript: { a: 1, b: 2 c: 3 } → MISSING COMMA after b: 2
         Python: [1, 2 3] → MISSING COMMA after 2
         
      2. MISSING SEMICOLONS (where required):
         JavaScript/Java/C++: int x = 5 → MISSING SEMICOLON
         
      3. TYPE MISMATCHES:
         Java: int x = "string" → Cannot assign String to int
         TypeScript: let x: number = "text" → Type mismatch
         
      4. SYNTAX ERRORS:
         - Unclosed brackets, parentheses, quotes
         - Invalid operators or keywords
         - Malformed expressions
      
      5. UNDEFINED VARIABLES:
         Using variables before declaration
      
      INSTRUCTIONS:
      - Analyze the ENTIRE file for syntax errors
      - Pay special attention to object literals, arrays, and punctuation
      - Check EVERY comma, semicolon, bracket
      - If you see two properties without a comma between them → FLAG IT
      - Example: invalidField: null propsDetails: null → MISSING COMMA
      
      RESPONSE FORMAT (JSON array only, no markdown):
      [{"type": "syntax_error", "severity": "critical", "title": "Missing comma in object literal", "message": "Missing comma after 'invalidField: null' on line 22", "line": 22, "suggestion": "Add comma after invalidField: null"}]
      
      If NO errors, return: []

# GitHub integration
github:
  # Comment on PR with review results
  post_comments: true
  
  # Create review with approve/request changes
  create_review: true
  
  # Add labels based on review results
  add_labels: true
  
  labels:
    needs_security_review: 'security-review-needed'
    needs_performance_review: 'performance-review-needed'
    approved: 'code-review-approved'
    changes_requested: 'changes-requested'
  
  # Review comment format
  comment_format: |
    ## 🤖 Automated Code Review
    
    {summary}
    
    ### Issues Found: {issue_count}
    
    {issues}
    
    ---
    *This review was automatically generated. Please review the suggestions and make necessary changes.*

# Notification settings
notifications:
  slack:
    enabled: false
    webhook_url: ''
    channels:
      critical: '#code-review-critical'
      general: '#code-review'
  
  email:
    enabled: false
    recipients: []
    smtp_server: ''

